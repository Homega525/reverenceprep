<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Reverence Preparatory School</title>
  <meta name="description" content="Contact Reverence Preparatory School in Old Town, Offinso, Ashanti, Ghana.">
  <meta property="og:title" content="Contact Reverence Preparatory School">
  <meta property="og:description" content="Send us your enquiries or visit our campus in Offinso.">
  <meta property="og:image" content="assets/img/about/about-main.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/carousel.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="js/navbar.js" defer></script>
  <script src="js/carousel.js" defer></script>
  <script src="js/forms.js" defer></script>
  <script src="js/main.js" defer></script>
  <link rel="icon" type="image/png" href="assets/img/logo/favicon.png">
</head>
<body class="has-hero" data-page="contact">
  <header id="site-header"></header>
  <main>
    <section class="page-hero">
      <div class="container" data-animate>
        <h1>Contact For Any Query</h1>
        <p>We are available to support admissions and school enquiries.</p>
        <p class="breadcrumb"><a href="index.html">Home</a> / Contact</p>
      </div>
    </section>

    <section class="section" data-animate>
      <div class="container contact-grid contact-page-grid">
        <div class="card">
          <div class="map-wrap" style="margin-bottom: 18px;">
            <iframe title="Map to Offinso" src="https://www.google.com/maps?q=Offinso%2C%20Ashanti%2C%20Ghana&output=embed" width="100%" height="300" style="border:0;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
          <ul class="info-list">
            <li><strong>Address:</strong> Old Town, Offinso, Ashanti, Ghana</li>
            <li><strong>Phone:</strong> <a href="tel:+233554019237">+233 554 019 237</a></li>
            <li><strong>Email:</strong> <a href="mailto:reverence475@gmail.com">reverence475@gmail.com</a></li>
          </ul>
        </div>

        <form class="form-card" name="contact-form" action="/" method="POST" data-netlify="true" netlify netlify-honeypot="bot-field" aria-label="Full contact form">
          <input type="hidden" name="form-name" value="contact-form">
          <p style="display:none">
            <label>Skip this: <input name="bot-field"></label>
          </p>
          <div class="form-group"><label for="contact-name">Full Name</label><input id="contact-name" name="name" type="text" required></div>
          <div class="form-group"><label for="contact-email">Email Address</label><input id="contact-email" name="email" type="email" required></div>
          <div class="form-group"><label for="contact-phone">Phone Number</label><input id="contact-phone" name="phone" type="tel" required></div>
          <div class="form-group"><label for="contact-subject">Subject</label><input id="contact-subject" name="subject" type="text" required></div>
          <div class="form-group"><label for="contact-message">Message</label><textarea id="contact-message" name="message" required></textarea></div>
          <button class="btn btn-primary" type="submit">Submit</button>
          <p class="form-feedback" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
    <div style="display:none">
  <form name="contact-form" netlify>
    <input name="name">
    <input name="email">
    <input name="phone">
    <input name="subject">
    <textarea name="message"></textarea>
  </form>
  </main>
  <footer id="site-footer" class="site-footer footer"></footer>
  
</div>
</body>
</html>
