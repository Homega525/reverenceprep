<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Reverence Preparatory School</title>
  <meta name="description" content="Browse campus life, events, sports, and student moments from Reverence Preparatory School.">
  <meta property="og:title" content="Reverence Preparatory Gallery">
  <meta property="og:description" content="A visual look at school life in Old Town, Offinso.">
  <meta property="og:image" content="assets/img/gallery/gallery-1.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/carousel.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="js/navbar.js" defer></script>
  <script src="js/carousel.js" defer></script>
  <script src="js/forms.js" defer></script>
  <script src="js/main.js" defer></script>
  <link rel="icon" type="image/png" href="assets/img/logo/favicon.png">
</head>
<body class="has-hero" data-page="gallery">
  <header id="site-header"></header>
  <main>
    <section class="page-hero">
      <div class="container" data-animate>
        <h1>Gallery</h1>
        <p>School life, events, and achievements at Reverence Preparatory.</p>
        <p class="breadcrumb"><a href="/">Home</a> / Gallery</p>
      </div>
    </section>

    <section class="section" data-animate>
      <div class="container">
        <div class="gallery-controls" aria-label="Gallery filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="events">Events</button>
          <button class="filter-btn" data-filter="campus">Campus</button>
          <button class="filter-btn" data-filter="students">Students</button>
          <button class="filter-btn" data-filter="sports">Sports</button>
        </div>

        <div class="gallery-grid" id="galleryGrid">
          <figure class="gallery-item" data-category="events"><img src="assets/img/gallery/gallery-1.jpg" alt="Students at school event"><figcaption>Events</figcaption></figure>
          <figure class="gallery-item" data-category="campus"><img src="assets/img/gallery/gallery-2.jpg" alt="Campus environment"><figcaption>Campus</figcaption></figure>
          <figure class="gallery-item" data-category="students"><img src="assets/img/gallery/gallery-3.jpg" alt="Students learning in class"><figcaption>Students</figcaption></figure>
          <figure class="gallery-item" data-category="sports"><img src="assets/img/gallery/gallery-4.jpg" alt="Sports competition day"><figcaption>Sports</figcaption></figure>
          <figure class="gallery-item" data-category="events"><img src="assets/img/gallery/gallery-5.jpg" alt="Parents and teachers meeting"><figcaption>Events</figcaption></figure>
          <figure class="gallery-item" data-category="campus"><img src="assets/img/gallery/gallery-6.jpg" alt="Reverence school facility"><figcaption>Campus</figcaption></figure>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="galleryLightbox" aria-label="Image lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose" aria-label="Close lightbox">✕</button>
      <img id="lightboxImage" src="" alt="Expanded gallery item">
      <div class="lightbox-controls">
        <button class="lightbox-btn" id="lightboxPrev" aria-label="Previous image">‹</button>
        <button class="lightbox-btn" id="lightboxNext" aria-label="Next image">›</button>
      </div>
    </div>
  </div>

  <footer id="site-footer" class="site-footer footer"></footer>
</body>
</html>
